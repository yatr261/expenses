<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    margin-top:50px;
}

.container{
    width:350px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input{
    width:95%;
    padding:10px;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

li{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    background:#eee;
    padding:10px;
}

.delete{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    cursor:pointer;
}
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Tracker</h2>

    <input type="text" id="name" placeholder="Expense Name">
    <input type="number" id="amount" placeholder="Amount">
    <button id="addBtn">Add Expense</button>

    <h3>Total: ₹<span id="total">0</span></h3>

    <ul id="list"></ul>
</div>

<script src="expenses.js"></script>
</body>
</html>
